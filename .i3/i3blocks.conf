# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
separator_block_width=15

[volume]
command=~/.i3/volume get
interval=1

[memory]
label=
command=~/.i3/memory
interval=5

#[swap]
#label=SWAP
#instance=swap
#command=/usr/share/i3blocks/memory
#interval=30

[disk-home]
label=
command=/usr/share/i3blocks/disk
interval=30

[wireless]
label=
instance=wlan0
#instance=wlp3s0
command=/usr/share/i3blocks/network
color=#00FF00
interval=10

[ethernet0]
label=(eth0)
instance=eth0
command=/usr/share/i3blocks/network
color=#00FF00
interval=10

[ethernet1]
label=(eth1)
instance=eth1
command=/usr/share/i3blocks/network
color=#00FF00
interval=10

[cpu]
label=CPU
command=/usr/share/i3blocks/cpu_usage
interval=10
min_width=CPU: 100.00%
#separator=false

#[load]
#command=/usr/share/i3blocks/load_average
#interval=10

[battery]
label=BAT
#label=⚡
command=/usr/share/i3blocks/battery
interval=30

[time]
command=echo   $(date '+%b-%d %H:%M:%S')
color=##a64dff
interval=1
